name: scroll_spy
description: Detect visible items and select one stable primary item in Flutter scrollables for video autoplay, analytics, reading position, and prefetching.
version: 1.0.5
homepage: https://omar-hanafy.github.io/scroll-spy/
repository: https://github.com/omar-hanafy/scroll_spy
issue_tracker: https://github.com/omar-hanafy/scroll_spy/issues
screenshots:
  - description: Autoplay feed with one stable primary item and live focus metrics
    path: screenshots/autoplay-feed.png

topics:
  - autoplay
  - feed
  - scroll
  - viewport
  - visibility

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
