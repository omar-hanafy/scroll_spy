name: Flutter CI (scroll_spy)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_DIR: .

jobs:
  test:
    name: Test on ${{ matrix.channel }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        channel: [stable, beta]
    continue-on-error: ${{ matrix.channel == 'beta' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.channel }}
          cache: true
      - name: Flutter version
        run: flutter --version
      - name: Install dependencies
        working-directory: ${{ env.PACKAGE_DIR }}
        run: flutter pub get
      - name: Check formatting
        working-directory: ${{ env.PACKAGE_DIR }}
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        working-directory: ${{ env.PACKAGE_DIR }}
        run: flutter analyze
      - name: Run tests
        working-directory: ${{ env.PACKAGE_DIR }}
        run: flutter test
      - name: Install example dependencies
        working-directory: example
        run: flutter pub get
      - name: Analyze example
        working-directory: example
        run: flutter analyze
      - name: Run example tests
        working-directory: example
        run: flutter test
      - name: Install benchmark dependencies
        working-directory: benchmark
        run: flutter pub get
      - name: Analyze benchmark
        working-directory: benchmark
        run: flutter analyze
      - name: Run comparison benchmark assertions
        working-directory: benchmark
        run: flutter test test/visibility_comparison_benchmark_test.dart

  ai-plugin:
    name: Validate AI plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Validate plugin manifests, skills, and version sync
        run: dart run tool/validate_ai_plugin.dart
